name: Apply approved guide update

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apply-approved-guide-update.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply approved Markdown updates
        shell: python
        run: |
          from pathlib import Path
          import base64
          import re

          guide_path = Path("llm_coding_workflow_guide.md")
          primer_path = Path("llm-workflow-primer.md")

          guide = guide_path.read_text(encoding="utf-8")
          primer = primer_path.read_text(encoding="utf-8")

          def decode(value: str) -> str:
              return base64.b64decode(value).decode("utf-8")

          STAGE2A = decode("")
          LOOP_A = decode("")
          LOOP_B_BODY = decode("")
          LOOP_F = decode("")
          LOOP_G_BODY = decode("")
          FRESHNESS = decode("")
          CURRENT_STATE = decode("")
          OPERATING = decode("")
          OLD_PRIMER_FRESHNESS = decode("")
          NEW_PRIMER_FRESHNESS = decode("")

          def replace_exact(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f"Missing expected text for replacement: {label}")
              return text.replace(old, new)

          def replace_regex(text: str, pattern: str, replacement: str, label: str) -> str:
              new_text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f"Expected exactly one replacement for {label}, found {count}")
              return new_text

          guide = replace_exact(
              guide,
              "13. Repeat: plan work -> generate handoff -> implement -> docs/state update -> QA -> merge or patch.",
              "13. Repeat: plan work -> generate handoff -> implement -> docs update -> QA -> merge or patch.",
              "quick start loop wording",
          )
          guide = replace_exact(
              guide,
              "Prefer step-by-step guidance, lean Codex handoffs, reviewable slices, clear stop conditions, documentation delta requirements, and final state packets from coding agents.",
              "Prefer step-by-step guidance, lean Codex handoffs, reviewable slices, clear stop conditions, documentation delta requirements, and clear final reports from coding agents.",
              "starter instructions final reports",
          )
          guide = replace_exact(
              guide,
              "- Treat state packets as transition notes only.\n",
              "",
              "GitHub source-of-truth state packet rule",
          )
          guide = replace_exact(
              guide,
              "- The workflow primer covers campaign/slice/patch workflow, documentation freshness, state packets, documentation deltas, current-state refresh behavior, and prompt-manager placeholder style.",
              "- The workflow primer covers campaign/slice/patch workflow, documentation freshness, documentation deltas, current-state refresh behavior, and prompt-manager placeholder style.",
              "Stage 4 primer scope",
          )
          guide = replace_exact(
              guide,
              "Keep worktree setup in Codex project settings or helper scripts, not in every handoff prompt.\n\n\n## Stage 3 - Define the project",
              "Keep worktree setup in Codex project settings or helper scripts, not in every handoff prompt.\n" + STAGE2A + "\n\n## Stage 3 - Define the project",
              "Stage 2A insertion",
          )

          guide = replace_exact(guide, "- state packet expectation in the final report\n", "", "state packet handoff bullets")
          guide = replace_exact(
              guide,
              "After Codex finishes, paste its final report into ChatGPT. The final report should include a documentation delta and state packet.",
              "After Codex finishes, paste its final report into ChatGPT. The final report should include a documentation delta.",
              "Stage 8 final report intro",
          )
          guide = replace_exact(
              guide,
              "Codex final report:\n{{Paste the Codex final report, including the documentation delta and state packet if present}}",
              "Codex final report:\n{{Paste the Codex final report, including the documentation delta}}",
              "Codex final report prompt input",
          )
          guide = replace_exact(
              guide,
              "Use the state packet as orientation only. If current repo state matters, inspect repo docs at the target branch first, or ask me for the specific missing files if connector access is unavailable.",
              "If current repo state matters, inspect repo docs at the target branch first, or ask me for the specific missing files if connector access is unavailable.",
              "state packet orientation sentence",
          )
          guide = replace_exact(
              guide,
              "Start a new ChatGPT chat at the beginning of a new campaign or major phase. Use the state packet from the most recent Codex report as a transition note, not as source of truth. Ask ChatGPT to inspect repo docs at the target branch when current state matters.",
              "Start a new ChatGPT chat at the beginning of a new campaign or major phase. Ask ChatGPT to inspect repo docs at the target branch when current state matters.",
              "main loop intro",
          )

          guide = replace_regex(
              guide,
              r"## Loop Step A - .*?\n\n## Loop Step B - ",
              LOOP_A + "## Loop Step B - ",
              "Loop Step A",
          )
          guide = replace_regex(
              guide,
              r"Plan the next work item\n\nUse this for a campaign.*?\n\n\n## Loop Step C - ",
              LOOP_B_BODY + "## Loop Step C - ",
              "Loop Step B body",
          )
          guide = replace_exact(
              guide,
              "- documentation delta\n- state packet\n- manual QA recommendations\n- known risks",
              "- documentation delta\n- manual QA recommendations\n- known risks or follow-ups",
              "Codex final report bullets",
          )
          guide = replace_exact(
              guide,
              "Use the state packet as orientation only. If current repo state matters, inspect repo docs at the target branch first, or ask me for the specific missing files if connector access is unavailable. If the branch is unmerged, do not assume main includes the changes unless I say it was merged.",
              "If current repo state matters, inspect repo docs at the target branch first, or ask me for the specific missing files if connector access is unavailable. If the branch is unmerged, do not assume main includes the changes unless I say it was merged.",
              "QA review state packet orientation",
          )
          guide = replace_regex(
              guide,
              r"## Loop Step F - .*?\n\n\n## Loop Step G - ",
              LOOP_F + "## Loop Step G - ",
              "Loop Step F",
          )
          guide = replace_regex(
              guide,
              r"Close the campaign or phase\n\nWhen a campaign.*?\n\n# Documentation freshness system",
              LOOP_G_BODY + "# Documentation freshness system",
              "Loop Step G body",
          )
          guide = replace_regex(
              guide,
              r"# Documentation freshness system\n\n.*?## Docs health check",
              FRESHNESS + "## Docs health check",
              "Documentation freshness system",
          )
          guide = replace_exact(
              guide,
              "- state packet for the next ChatGPT session\n",
              "",
              "docs health check final report",
          )
          guide = replace_regex(
              guide,
              r"# Current-state protocol\n\n.*?# Operating rules",
              CURRENT_STATE + "# Operating rules",
              "Current-state protocol",
          )
          guide = replace_regex(
              guide,
              r"# Operating rules\n\n.*?# Appendix A - ChatGPT Project workflow primer",
              OPERATING + "# Appendix A - ChatGPT Project workflow primer",
              "Operating rules",
          )

          guide = replace_exact(guide, OLD_PRIMER_FRESHNESS, NEW_PRIMER_FRESHNESS, "embedded primer freshness")
          primer = replace_exact(primer, OLD_PRIMER_FRESHNESS, NEW_PRIMER_FRESHNESS, "standalone primer freshness")

          guide = re.sub(r"^- \*\*State packet:\*\*.*\n", "", guide, flags=re.M)

          for term in ["state packet", "state packets", "project-state file"]:
              lowered = guide.lower() + "\n" + primer.lower()
              if term in lowered:
                  raise SystemExit(f"Forbidden term remains: {term}")

          guide_path.write_text(guide, encoding="utf-8")
          primer_path.write_text(primer, encoding="utf-8")

      - name: Render guide HTML
        run: python tools/render_guide.py

      - name: Validate guide HTML
        run: python tools/validate_guide.py

      - name: Remove one-time workflow
        run: rm .github/workflows/apply-approved-guide-update.yml

      - name: Commit approved guide update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add llm_coding_workflow_guide.md llm-workflow-primer.md llm_coding_workflow_guide.html .github/workflows/apply-approved-guide-update.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Simplify guide workflow and remove state packets"
            git push
          fi
