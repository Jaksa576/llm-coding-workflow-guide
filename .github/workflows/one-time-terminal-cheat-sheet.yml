name: One-time terminal cheat sheet patch

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/one-time-terminal-cheat-sheet.yml'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  patch-terminal-cheat-sheet:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply terminal cheat sheet patch
        run: |
          python - <<'PY'
          from pathlib import Path

          guide = Path('llm_coding_workflow_guide.md')
          workflow = Path('.github/workflows/one-time-terminal-cheat-sheet.yml')
          text = guide.read_text(encoding='utf-8')

          old = '''## PowerShell cheat sheet

### Navigation

```powershell
Set-Location C:\\Code\\{{Project folder}}
Get-ChildItem
git status
```

### Git status and freshness

```powershell
git status
git branch --show-current
git fetch --all --prune
git log --oneline --decorate -5
```

### Commit and push

```powershell
git status
git add {{Files to commit}}
git commit -m '{{Short commit message}}'
git push -u origin {{Branch name}}
# If the repo provides one, then run:
.\\scripts\\verify-branch-pushed.ps1
```

### Local development

```powershell
npm install
npm run dev
npm test
npm run build
```

### Clean generated files

```powershell
Remove-Item -Recurse -Force .next,node_modules,coverage,playwright-report,test-results -ErrorAction SilentlyContinue
```
'''

          new = '''## Terminal cheat sheet

These commands are written for a Windows-native PowerShell terminal. If a project uses a different shell, adapt the path and process-management syntax instead of assuming WSL.

### Navigation

```powershell
Set-Location C:\\Code\\{{Project folder}}
Get-ChildItem
git status
```

### Git status and freshness

```powershell
git status
git branch --show-current
git fetch --all --prune
git log --oneline --decorate -5
```

### Commit and push

```powershell
git status
git add {{Files to commit}}
git commit -m '{{Short commit message}}'
git push -u origin {{Branch name}}
# If the repo provides one, then run:
.\\scripts\\verify-branch-pushed.ps1
```

### Local development

```powershell
npm install
npm run dev
# Keep this terminal open while the local app runs.
# To stop the local dev server, press Ctrl+C in this terminal.
# If PowerShell asks for confirmation, type Y and press Enter.
npm test
npm run build
```

### Close a stuck local dev server

Use this only when `Ctrl+C` did not close the dev server. Replace the port with the port shown by the dev server, such as `3000`, `5173`, or `8080`.

```powershell
$port = 5173
$devServerPid = (Get-NetTCPConnection -LocalPort $port -State Listen).OwningProcess
Get-Process -Id $devServerPid
Stop-Process -Id $devServerPid -Force
```

### Clean generated files

```powershell
Remove-Item -Recurse -Force .next,node_modules,coverage,playwright-report,test-results -ErrorAction SilentlyContinue
```
'''

          if old not in text:
              raise SystemExit('Expected PowerShell cheat sheet block was not found.')

          guide.write_text(text.replace(old, new, 1), encoding='utf-8')
          workflow.unlink()
          PY

      - name: Render guide HTML
        run: python tools/render_guide.py

      - name: Validate guide HTML
        run: python tools/validate_guide.py

      - name: Commit patched guide and generated HTML
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update terminal cheat sheet for dev server shutdown'
          file_pattern: |
            llm_coding_workflow_guide.md
            llm_coding_workflow_guide.html
            .github/workflows/one-time-terminal-cheat-sheet.yml
