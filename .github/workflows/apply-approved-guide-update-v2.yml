name: Apply approved guide update v2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply approved Markdown updates
        shell: python
        run: |
          from pathlib import Path
          import base64
          import re

          guide_path = Path("llm_coding_workflow_guide.md")
          primer_path = Path("llm-workflow-primer.md")

          guide = guide_path.read_text(encoding="utf-8")
          primer = primer_path.read_text(encoding="utf-8")

          def decode(value: str) -> str:
              return base64.b64decode(value).decode("utf-8")

          STAGE2A = decode("")
          LOOP_A = decode("")
          LOOP_B_SECTION = decode("")
          LOOP_F = decode("")
          LOOP_G = decode("")
          FRESHNESS = decode("")
          CURRENT_STATE = decode("")
          OPERATING = decode("")
          OLD_PRIMER_FRESHNESS = decode("")
          NEW_PRIMER_FRESHNESS = decode("")

          def replace_all(text: str, old: str, new: str, label: str, required: bool = False) -> str:
              count = text.count(old)
              if count == 0:
                  if required:
                      raise SystemExit(f"Missing expected text for replacement: {label}")
                  print(f"Skipping absent text: {label}")
                  return text
              print(f"Replacing {count} occurrence(s): {label}")
              return text.replace(old, new)

          def replace_between(text: str, start: str, end: str, replacement: str, label: str) -> str:
              s = text.find(start)
              if s < 0:
                  raise SystemExit(f"Missing start marker for {label}: {start}")
              e = text.find(end, s + len(start))
              if e < 0:
                  raise SystemExit(f"Missing end marker for {label}: {end}")
              print(f"Replacing section: {label}")
              return text[:s] + replacement.rstrip() + "\n\n" + text[e:]

          def replace_regex(text: str, pattern: str, replacement: str, label: str, required: bool = True) -> str:
              new_text, count = re.subn(pattern, replacement, text, flags=re.M)
              if count == 0:
                  if required:
                      raise SystemExit(f"Missing regex match for {label}")
                  print(f"Skipping absent regex: {label}")
                  return text
              print(f"Replacing {count} regex occurrence(s): {label}")
              return new_text

          guide = replace_all(
              guide,
              "13. Repeat: plan work -> generate handoff -> implement -> docs/state update -> QA -> merge or patch.",
              "13. Repeat: plan work -> generate handoff -> implement -> docs update -> QA -> merge or patch.",
              "quick start loop wording",
          )
          guide = replace_all(
              guide,
              "Prefer step-by-step guidance, lean Codex handoffs, reviewable slices, clear stop conditions, documentation delta requirements, and final state packets from coding agents.",
              "Prefer step-by-step guidance, lean Codex handoffs, reviewable slices, clear stop conditions, documentation delta requirements, and clear final reports from coding agents.",
              "starter instructions final reports",
          )
          guide = replace_all(guide, "- Treat state packets as transition notes only.\n", "", "state packet transition rule")
          guide = replace_all(
              guide,
              "- The workflow primer covers campaign/slice/patch workflow, documentation freshness, state packets, documentation deltas, current-state refresh behavior, and prompt-manager placeholder style.",
              "- The workflow primer covers campaign/slice/patch workflow, documentation freshness, documentation deltas, current-state refresh behavior, and prompt-manager placeholder style.",
              "Stage 4 primer scope",
          )

          if "## Stage 2A - Optional Codex worktree setup and cleanup scripts" not in guide:
              guide = replace_all(
                  guide,
                  "Keep worktree setup in Codex project settings or helper scripts, not in every handoff prompt.\n\n\n## Stage 3 - Define the project",
                  "Keep worktree setup in Codex project settings or helper scripts, not in every handoff prompt.\n" + STAGE2A + "\n\n## Stage 3 - Define the project",
                  "Stage 2A insertion",
                  required=True,
              )
          else:
              print("Stage 2A already present; skipping insertion.")

          guide = replace_all(guide, "- state packet expectation in the final report\n", "", "handoff state packet bullet")
          guide = replace_all(
              guide,
              "After Codex finishes, paste its final report into ChatGPT. The final report should include a documentation delta and state packet.",
              "After Codex finishes, paste its final report into ChatGPT. The final report should include a documentation delta.",
              "Stage 8 final report intro",
          )
          guide = replace_all(
              guide,
              "Codex final report:\n{{Paste the Codex final report, including the documentation delta and state packet if present}}",
              "Codex final report:\n{{Paste the Codex final report, including the documentation delta}}",
              "Codex final report prompt input",
          )
          guide = replace_all(guide, "Use the state packet as orientation only. ", "", "state packet orientation prefix")
          guide = replace_all(guide, "Treat the state packet as a transition note only.\n", "", "state packet transition note rule")
          guide = replace_all(
              guide,
              "Start a new ChatGPT chat at the beginning of a new campaign or major phase. Use the state packet from the most recent Codex report as a transition note, not as source of truth. Ask ChatGPT to inspect repo docs at the target branch when current state matters.",
              "Start a new ChatGPT chat at the beginning of a new campaign or major phase. Ask ChatGPT to inspect repo docs at the target branch when current state matters.",
              "main loop intro",
          )

          guide = replace_between(guide, "## Loop Step A -", "## Loop Step B -", LOOP_A, "Loop Step A")
          guide = replace_between(guide, "## Loop Step B -", "## Loop Step C -", LOOP_B_SECTION, "Loop Step B")
          guide = replace_all(
              guide,
              "- documentation delta\n- state packet\n- manual QA recommendations\n- known risks",
              "- documentation delta\n- manual QA recommendations\n- known risks or follow-ups",
              "Codex final report bullets",
          )
          guide = replace_between(guide, "## Loop Step F -", "## Loop Step G -", LOOP_F, "Loop Step F")
          guide = replace_between(guide, "## Loop Step G -", "# Documentation freshness system", LOOP_G, "Loop Step G")
          guide = replace_between(guide, "# Documentation freshness system", "## Docs health check", FRESHNESS, "Documentation freshness system")
          guide = replace_all(guide, "- state packet for the next ChatGPT session\n", "", "docs health check final report line")
          guide = replace_between(guide, "# Current-state protocol", "# Operating rules", CURRENT_STATE, "Current-state protocol")
          guide = replace_between(guide, "# Operating rules", "# Appendix A - ChatGPT Project workflow primer", OPERATING, "Operating rules")

          guide = replace_all(guide, OLD_PRIMER_FRESHNESS, NEW_PRIMER_FRESHNESS, "embedded primer freshness", required=True)
          primer = replace_all(primer, OLD_PRIMER_FRESHNESS, NEW_PRIMER_FRESHNESS, "standalone primer freshness", required=True)
          guide = replace_regex(guide, r"^- \*\*State packet:\*\*.*\n", "", "state packet key term", required=False)

          lowered = guide.lower() + "\n" + primer.lower()
          for term in ["state packet", "state packets", "project-state file"]:
              if term in lowered:
                  raise SystemExit(f"Forbidden term remains: {term}")

          guide_path.write_text(guide, encoding="utf-8")
          primer_path.write_text(primer, encoding="utf-8")

      - name: Render guide HTML
        run: python tools/render_guide.py

      - name: Validate guide HTML
        run: python tools/validate_guide.py

      - name: Remove one-time workflows
        run: |
          rm -f .github/workflows/apply-approved-guide-update.yml
          rm -f .github/workflows/apply-approved-guide-update-v2.yml

      - name: Commit approved guide update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add llm_coding_workflow_guide.md llm-workflow-primer.md llm_coding_workflow_guide.html .github/workflows/apply-approved-guide-update.yml .github/workflows/apply-approved-guide-update-v2.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Simplify guide workflow and remove state packets"
            git push
          fi
