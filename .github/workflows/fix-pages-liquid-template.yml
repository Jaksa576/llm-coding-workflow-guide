name: Fix Pages Liquid template issue

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-pages-liquid:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Patch Liquid-sensitive template text
        shell: python
        run: |
          from pathlib import Path

          paths = [
              Path('llm_coding_workflow_guide.md'),
          ]

          old = '$key.Contains("' + '{{' + '")'
          new = '$key.StartsWith("{")'

          changed = []
          for path in paths:
              text = path.read_text(encoding='utf-8')
              if old in text:
                  text = text.replace(old, new)
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          if not changed:
              raise SystemExit('Did not find the Liquid-sensitive PowerShell template text to patch.')

          print('Patched files:')
          for item in changed:
              print(f'- {item}')

      - name: Render guide HTML
        run: python tools/render_guide.py

      - name: Validate guide HTML
        run: python tools/validate_guide.py

      - name: Remove one-time workflow
        run: rm -f .github/workflows/fix-pages-liquid-template.yml

      - name: Commit Pages Liquid fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add llm_coding_workflow_guide.md llm_coding_workflow_guide.html .github/workflows/fix-pages-liquid-template.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix Pages Liquid parsing in worktree setup template"
            git push
          fi
